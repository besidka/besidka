<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 960" role="img" aria-label="Besidka chat preview — mobile model switcher">
  <defs>
    <linearGradient id="bg-m" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef5fa"/>
      <stop offset="100%" stop-color="#fde4f1"/>
    </linearGradient>
    <filter id="shadow-m"><feDropShadow dx="0" dy="4" stdDeviation="10" flood-opacity="0.1"/></filter>
