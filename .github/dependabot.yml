version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    # Match pnpm 11's default minimumReleaseAge (1440 minutes = 1 day) so
    # Dependabot never proposes a version pnpm's install-time supply-chain
    # policy would then reject as too freshly published. Does not apply to
    # security-update PRs, which always ignore cooldown.
    cooldown:
      default-days: 1
    # Group minor and patch updates together to reduce PR noise
    groups:
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
    # Dependabot will only update dependencies listed in package.json
    # Transitive dependency updates (like lodash) will be ignored/fail gracefully
    # https://docs.github.com/en/code-security/tutorials/secure-your-dependencies/optimizing-pr-creation-version-updates
    ignore:
      # Keep @types/node aligned with Node.js runtime version (v24 LTS)
      # Only allow minor/patch updates, prevent major version bumps
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # TypeScript 7 (native/Go compiler port) ships without a stable
      # compiler API. vue-tsc (drives `pnpm run typecheck`) has no TS7
      # support yet (vuejs/language-tools#5381) and typescript-eslint's
      # peer range excludes it outright, crashing at runtime if forced
      # (typescript-eslint/typescript-eslint#12518). Revisit once both
      # ship support -- see PR #297 for the full research writeup.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: "scope"
