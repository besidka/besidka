name: Build

on:
  workflow_call

jobs:
  build:
    name: "Build the application"
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.deployment-url }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

      - name: Run TypeScript type checks
        run: pnpm run typecheck

      - name: Run tests
        run: pnpm run coverage

      - name: Build application
        env:
          ROLLDOWN_OPTIONS_VALIDATION: loose
        run: pnpm run build

      - name: Generate wrangler
        env:
          WRANGLER_DB_ID: ${{ secrets.WRANGLER_DB_ID }}
          WRANGLER_KV_ID: ${{ secrets.WRANGLER_KV_ID }}
        run: |
            jq 'walk(if type == "string" then
            gsub("%DB_ID"; "${{ env.WRANGLER_DB_ID }}") |
            gsub("%KV_ID"; "${{ env.WRANGLER_KV_ID }}") |
            else . end)' .github/wrangler.jsonc > .wrangler.jsonc

      - name: Deploy Admin to Cloudlfare Pages via Wrangler
        id: deploy
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        with:
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          packageManager: pnpm
          command: deploy

      - name: Print deployed URL
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: echo $DEPLOYMENT_URL