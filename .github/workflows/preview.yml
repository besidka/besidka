name: Deploy the project to Cloudflare Workers

on:
  pull_request:
    types: [opened, synchronize, reopened]
    
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    name: "Update PR"
    if: github.event_name == 'pull_request'
    #if: github.event_name == 'pull_request' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    continue-on-error: false
    permissions:
      pull-requests: write
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/scripts

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm add -D @actions/github-script

      - name: Update PR data
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { updatePR } = await import(
              '${{ github.workspace }}/.github/scripts/pr.js'
            )

            await updatePR({ github, context })

  build:
    uses: ./.github/workflows/build.yml
    secrets: inherit
    permissions:
      contents: read
      id-token: write
    
  comment:
    name: "Comment preview URL on PR"
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      id-token: write

    steps:
      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { displayPreviewUrl } = await import(
              '${{ github.workspace }}/.github/scripts/preview.js'
            )

            await displayPreviewUrl({ github, context })
        env:
          DEPLOYMENT_URL: ${{ needs.build.outputs.url }}